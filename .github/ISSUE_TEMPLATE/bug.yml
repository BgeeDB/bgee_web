name: 🐞 Bug
description: Report a bug on the website
body:
  # - attributes:
  #     value: |
  #       Some general tips
  #   type: markdown

  - id: describe-issue
    type: textarea
    attributes:
      label: Describe the issue
      description: |
        Describe the issue.

        - What did you expect to happen?
        - What did you see instead?
        - Feel free to include screenshots if that can help.
    validations:
      required: true

  - id: page-url
    type: input
    attributes:
      label: Page URL
      description: Please provide a link to the page.
    validations:
      required: true

  - id: browsers
    type: checkboxes
    attributes:
      label: On which browsers did you notice the issue?
      options:
        - label: Mozilla Firefox
        - label: Chrome
        - label: Edge
        - label: Safari
        - label: Brave
        - label: Zen
