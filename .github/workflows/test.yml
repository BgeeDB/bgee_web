name: Tests
on:
  push:
    branches: ['main', 'develop']
  workflow_dispatch:
  workflow_call:
  pull_request:

jobs:
  test:
    name: ✅ Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧹 Lint
        run: npm run lint

      - name: 🔍 Run type check
        run: npm run typecheck

      - name: 📦 Build
        run: npm run build
